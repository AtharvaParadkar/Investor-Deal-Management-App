name: deal_flow
description: "Investor Deal Management App - Browse, filter, and track investment deals."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.3
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0D1117"
  android: true
  ios: true
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
